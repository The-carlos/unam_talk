apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ml-prediction-service
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 80
      containers:
        - image: us-central1-docker.pkg.dev/your-gcp-project-id/ml-model-serving/ml-prediction-app:latest
          ports:
            - containerPort: 4000
          env:
            - name: MODEL_PATH
              value: models/pokemon_knn_pipeline.joblib
            - name: EXPECTED_COLUMNS
              value: Type 1,Type 2,Total,HP,Attack,Defense,Sp. Atk,Sp. Def,Speed,Generation,Legendary
            - name: PREDICTION_COLUMN
              value: prediction
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
